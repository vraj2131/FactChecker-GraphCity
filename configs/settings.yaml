app:
  name: factgraph-city
  env: development
  debug: true

server:
  host: 0.0.0.0
  port: 8000

paths:
  raw_data_dir: data/raw
  processed_data_dir: data/processed
  cache_dir: data/cache
  artifacts_dir: data/artifacts

# Cache namespaces (subdirectories under cache_dir)
cache_namespaces:
  retrieval: retrieval_results
  nli: nli_results
  llm_local: llm_outputs
  llm_groq: groq_outputs
  api_responses: api_responses
